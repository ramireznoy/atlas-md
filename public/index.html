<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDAtlas</title>

  <link rel="icon" type="image/png" href="/favicon.png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
  <link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link id="hljs-dark"  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" media="print">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="/css/app.css">

  <script type="importmap">
  { "imports": { "vue": "https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.prod.js" } }
  </script>
</head>
<body class="antialiased">
<div id="app">

  <!-- ════ AUTH GATE ════ -->
  <div v-if="!authReady" class="auth-screen">
    <div class="card auth-card shadow-sm">
      <i class="ti ti-brand-markdown text-primary mb-3" style="font-size:3rem;"></i>
      <h2 class="mb-1">MDAtlas</h2>

      <!-- invalid / missing token -->
      <template v-if="authError">
        <p class="text-muted mt-3 mb-1">Access token is missing or invalid.</p>
        <p class="text-muted small">Use the URL printed in the server console:</p>
        <code class="d-block bg-surface rounded px-3 py-2 mt-2 small text-start" style="word-break:break-all;">
          http://localhost:PORT/?token=…
        </code>
      </template>

      <!-- checking -->
      <template v-else>
        <div class="spinner-border text-primary mt-4" role="status"></div>
        <p class="text-muted mt-3 mb-0 small">Verifying access…</p>
      </template>
    </div>
  </div>

  <!-- ════ APP (only rendered after auth) ════ -->
  <template v-else>
  <div class="page" :class="{ 'sidebar-hidden': !sidebarOpen }">

    <!-- ════════════ SIDEBAR ════════════ -->
    <aside class="navbar navbar-vertical navbar-expand-lg">
      <div class="sidebar-resizer" @mousedown.prevent="startResize($event)"></div>
      <div class="sidebar-inner w-100">

        <div class="d-flex align-items-center px-3 py-3 border-bottom gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5b8db8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M19.5 7a9 9 0 0 0 -7.5 -4a8.991 8.991 0 0 0 -7.484 4"/>
            <path d="M11.5 3a16.989 16.989 0 0 0 -1.826 4"/>
            <path d="M12.5 3a16.989 16.989 0 0 1 1.828 4"/>
            <path d="M19.5 17a9 9 0 0 1 -7.5 4a8.991 8.991 0 0 1 -7.484 -4"/>
            <path d="M11.5 21a16.989 16.989 0 0 1 -1.826 -4"/>
            <path d="M12.5 21a16.989 16.989 0 0 0 1.828 -4"/>
            <g transform="translate(-0.5, 0)">
              <path d="M2 14 L2 11 Q2 10 3 10 Q4 10 4 11 L4 14 M4 11 Q4 10 5 10 Q6 10 6 11 L6 14"/>
              <path d="M11.5 10 Q9 10 9 12 Q9 14 11.5 14 Q11.5 12 11.5 10 L11.5 14"/>
              <path d="M14.5 14 L14.5 10 Q14.5 10 15.5 10 Q17 10 17 11.5"/>
              <path d="M20 10 L20 14 M20 12 L23 10 M20 12 L23 14"/>
            </g>
          </svg>
          <span class="fw-bold fs-5">MDAtlas</span>
          <button class="btn btn-icon btn-ghost-secondary btn-sm ms-auto" @click="loadTree" title="Refresh tree">
            <i class="ti ti-refresh" :class="{ 'ti-spin': loading }"></i>
          </button>
        </div>

        <div class="px-3 py-2 border-bottom">
          <div class="text-muted d-flex align-items-center gap-1" style="font-size:.75rem;" :title="rootPath">
            <i class="ti ti-folder-root flex-shrink-0"></i>
            <span class="text-truncate">{{ rootPath }}</span>
          </div>
        </div>

        <div class="sidebar-scroll">
          <div v-if="loading && tree.length === 0" class="text-center py-5 text-muted">
            <div class="spinner-border spinner-border-sm"></div>
          </div>
          <div v-else-if="tree.length === 0" class="text-center py-5 text-muted small">
            <i class="ti ti-mood-empty d-block mb-2" style="font-size:2rem;"></i>
            No .md files found
          </div>
          <template v-else>
            <tree-node
              v-for="item in tree"
              :key="item.path"
              :item="item"
              :selected-path="selectedFile?.path"
              @select="openFile"
            />
          </template>
        </div>

      </div>
    </aside>

    <!-- ════════════ MAIN ════════════ -->
    <div class="page-wrapper">

      <!-- Header -->
      <div class="page-header page-header-border sticky-top py-3 d-print-none">
        <div class="container-xl">
          <div class="row align-items-center flex-wrap g-2">

            <!-- Sidebar toggle -->
            <div class="col-auto">
              <button class="btn btn-icon btn-ghost-secondary"
                @click="sidebarOpen = !sidebarOpen"
                :title="sidebarOpen ? 'Collapse sidebar' : 'Expand sidebar'">
                <i class="ti" :class="sidebarOpen ? 'ti-layout-sidebar-left-collapse' : 'ti-layout-sidebar-left-expand'"></i>
              </button>
            </div>

            <div class="col min-w-0">
              <div class="text-muted small text-truncate mb-1">
                <span v-if="selectedFile">
                  {{ selectedFile.path }}
                  <span v-if="isDirty" class="dirty-dot" title="Unsaved changes"></span>
                </span>
                <span v-else>No file selected</span>
              </div>
              <h2 class="page-title mb-0 text-truncate d-block">
                {{ selectedFile ? selectedFile.name.replace(/\.md$/i,'') : 'mdatlas' }}
              </h2>
            </div>

            <div class="col-auto">
              <div class="btn-group" role="group">

                <button class="btn" @click="toggleTheme"
                  :title="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
                  <i class="ti" :class="isDark ? 'ti-sun' : 'ti-moon'"></i>
                </button>

                <template v-if="selectedFile">
                  <button class="btn" :class="{ 'btn-primary': !editMode }" @click="editMode = false">
                    <i class="ti ti-eye me-1"></i>Read
                  </button>
                  <button class="btn" :class="{ 'btn-primary': editMode }" @click="editMode = true">
                    <i class="ti ti-pencil me-1"></i>Edit
                  </button>
                </template>

                <button v-if="editMode && selectedFile"
                  class="btn btn-success"
                  @click="saveFile"
                  :disabled="saving || !isDirty"
                  title="Save (⌘S / Ctrl+S)">
                  <span v-if="saving" class="spinner-border spinner-border-sm me-1"></span>
                  <i v-else class="ti ti-device-floppy me-1"></i>
                  {{ saving ? 'Saving…' : 'Save' }}
                </button>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Body -->
      <div class="page-body">
        <div class="container-xl">

          <transition name="mode-fade" mode="out-in" @after-enter="onAfterEnter">

            <div v-if="!selectedFile" key="empty" class="empty-state text-muted">
              <i class="ti ti-brand-markdown" style="font-size:4rem; opacity:.3;"></i>
              <p class="mb-0">Select a file from the sidebar to get started</p>
            </div>

            <div v-else-if="loadingFile" key="loading" class="empty-state text-muted">
              <div class="spinner-border"></div>
            </div>

            <!-- CodeMirror editor, fresh instance each time edit mode is entered -->
            <div v-else-if="editMode" key="editor" ref="editorContainer" class="cm-container"></div>

            <div v-else key="read" class="markdown-body" v-html="renderedHtml"></div>

          </transition>

        </div>
      </div>

    </div>
  </div>

  <transition name="mode-fade">
    <div v-if="toast.show" class="toast-bar alert mb-0 py-2 px-3 d-flex align-items-center gap-2"
         :class="`alert-${toast.type}`">
      <i class="ti flex-shrink-0" :class="toast.type === 'success' ? 'ti-circle-check' : 'ti-alert-circle'"></i>
      <span>{{ toast.message }}</span>
    </div>
  </transition>

  <transition name="mode-fade">
    <div v-if="serverDown" class="server-down-overlay">
      <div class="server-down-card">
        <i class="ti ti-plug-connected-x text-danger mb-3" style="font-size:3rem;"></i>
        <h3 class="mb-1">Server stopped</h3>
        <p class="text-muted mb-0 small">Restart the server and reload this page.</p>
      </div>
    </div>
  </transition>

  <template v-if="showShortcuts">
    <div class="modal modal-blur fade show d-block" tabindex="-1" role="dialog" @click.self="showShortcuts = false">
      <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Keyboard shortcuts</h5>
            <button type="button" class="btn-close" @click="showShortcuts = false"></button>
          </div>
          <div class="modal-body">
            <table class="table table-sm table-borderless mb-0">
              <tbody>
                <tr>
                  <td>Save changes</td>
                  <td class="text-end"><kbd>⌘</kbd> / <kbd>Ctrl</kbd> + <kbd>S</kbd></td>
                </tr>
                <tr>
                  <td>Toggle edit / read</td>
                  <td class="text-end"><kbd>⌘</kbd> / <kbd>Ctrl</kbd> + <kbd>I</kbd></td>
                </tr>
                <tr>
                  <td>Show shortcuts</td>
                  <td class="text-end"><kbd>F1</kbd></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-backdrop fade show"></div>
  </template>

  </template><!-- end v-else auth -->
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js"></script>
<script type="module" src="/js/main.js"></script>
</body>
</html>
